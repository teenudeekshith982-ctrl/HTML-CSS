<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clean Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Radio controls -->
  <input type="radio" name="modal" id="open-modal">
  <input type="radio"  name='modal' id="close-modal">
  <input type="radio"  id="save-btn">

    <header>
      <h1>Task5-ModalPopup</h1>
    </header>
  <main>

    <div class="card">
      <label for="open-modal" class="open-btn">Show Modal</label>
    </div>

    <label for="close-modal" class="overlay"></label>
    <!-- Modal -->
    <div class="modal">
      <div class="modal-content">
        <div class="modal-title">
            <h5>Modal title</h5>
            <label for="close-modal" class="wrong-btn">&times;</label>
        </div>

        <div class="modal-body">
          <p>Modal body goes text here</p>
        </div>
        
        <div class="modal-footer">
            <label for="close-modal" id="close-label">Close</label>
            <label for="save-btn" id="save-label">Save changes</label>
        </div>

      
      </div>
    </div>
  </main>

</body>
</html>
